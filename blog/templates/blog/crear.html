{% load static %} 
<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8">
    <title>Nueva Receta</title> 
    <link rel="stylesheet" href="{% static 'blog/style.css' %}"> 
</head> 
<body> 
    <h1>Añadir una Nueva Delicia </h1> 

    <div class="form-container">
        {% if error %} 
            <div class="error-box">{{ error }}</div> 
        {% endif %} 

        <form method="post"> 
            {% csrf_token %} 
            
            <label>Nombre del Postre:</label><br> 
            <input type="text" name="titulo" placeholder="Ej. Pastel de Tres Leches" required><br><br> 
            
            <label>Categoría:</label><br>
            <input type="text" name="categoria" placeholder="Ej. Pasteles, Tartas, Galletas"><br><br>
            
            <label>Ingredientes y Preparación:</label><br> 
            <textarea name="contenido" rows="6" cols="40" placeholder="Escribe el paso a paso aquí..." required></textarea><br><br> 
            
            <label>Tu Nombre (Autora):</label><br> 
            <input type="text" name="autor" placeholder="Tu nombre lindo" required><br><br> 
            
            <button type="submit" class="btn">Guardar Receta </button>
        </form>
        <br>
        <a href="/" class="back-link"> Volver al recetario</a> 
    </div>
</body> 
</html>
